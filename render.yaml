services:
  # Backend API (Flask portal.py)
  - type: web
    name: nlp-uk-clinical-portal
    runtime: docker
    dockerfilePath: ./Dockerfile.portal
    plan: free
    envVars:
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false        # set manually in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false        # set manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true

  # Frontend (React + Vite)
  - type: web
    name: nlp-uk-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://nlp-uk-clinical-portal.onrender.com
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
