[pytest]
minversion = 7.0
addopts =
    -q
    --maxfail=1
    --disable-warnings
    --cov=preprocessing
    --cov=tier1_textract
    --cov=tier2_router
    --cov=track_a_snomed
    --cov=track_b_summarization
    --cov=track_b_validation
    --cov=lambda_confidence_aggregator
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
testpaths =
    .
python_files = test_*.py
