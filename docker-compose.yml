version: '3.8'

services:
  # Portal backend (Flask) - serves /api/process and /api/result endpoints
  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    ports:
      - "5000:5000"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - PORT=5000
    volumes:
      - ./portal_uploads:/app/portal_uploads
      - ./portal_results:/app/portal_results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React frontend with nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - portal

# For local development without Docker:
# 1. Start Portal: python portal.py
# 2. Start Frontend: cd frontend && npm run dev
